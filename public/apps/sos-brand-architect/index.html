
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOS Brand Architect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #ff4d00; /* Daha canlı turuncu */
            margin: 0;
            overflow-x: hidden;
            color: white;
            height: 100vh;
            -webkit-user-select: none;
               -moz-user-select: none;
                    user-select: none;
        }

        /* Akışkan Canlı Okyanus Arayüzü */
        .ocean-bg { 
          position: fixed;
          inset: 0;
          background: linear-gradient(180deg, #ff9e22 0%, #ff4d00 100%); /* Canlı turuncu geçiş */
          z-index: -10;
          overflow: hidden;
        }

        .caustics {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/water.png');
            opacity: 0.15;
            animation: moveCaustics 25s linear infinite;
            pointer-events: none;
            z-index: -5;
        }

        .wave-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -8;
            opacity: 0.4;
        }

        .wave {
          background: url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/85486/wave.svg') repeat-x; 
          position: absolute;
          bottom: 0;
          width: 6400px;
          height: 198px;
          animation: wave 12s cubic-bezier(0.36, 0.45, 0.63, 0.53) infinite;
          transform: translate3d(0, 0, 0);
          filter: brightness(1.2);
        }

        .wave:nth-of-type(2) {
          bottom: 20px;
          animation: wave 12s cubic-bezier(0.36, 0.45, 0.63, 0.53) -0.125s infinite, swell 10s ease -1.25s infinite;
          opacity: 0.6;
        }

        @keyframes wave {
          0% { margin-left: 0; }
          100% { margin-left: -1600px; }
        }

        @keyframes moveCaustics {
            from { background-position: 0 0; }
            to { background-position: 1000px 1000px; }
        }

        @keyframes swell {
          0%, 100% { transform: translate3d(0,-25px,0); }
          50% { transform: translate3d(0,10px,0); }
        }

        @keyframes swim {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-10px) scale(1.02); }
        }

        .animate-swim { animation: swim 6s ease-in-out infinite; }

        .glass {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.4); border-radius: 20px; }
        
        #root { height: 100%; position: relative; z-index: 10; }

        .full-bleed-box {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        .full-bleed-box img {
            width: 100%;
            height: 100%;
            -o-object-fit: cover;
               object-fit: cover;
            display: block;
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>

<link rel="stylesheet" href="/index.css">
<script type="importmap">
{

}

</head>
<body>
    <div class="ocean-bg"></div>
    <div class="wave-container">
        <div class="wave"></div>
        <div class="wave"></div>
    </div>
    <div class="caustics"></div>
    <div id="root"></div>
</body>
</html>
